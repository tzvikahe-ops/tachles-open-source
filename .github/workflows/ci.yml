name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: Deno
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task verify

  mini-app:
    name: Mini App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mini-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mini-app/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm audit --audit-level=high

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-app/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high

  setup-wizard:
    name: Setup Wizard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - shell: powershell
        run: |
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass `
            -File scripts/setup-wizard/tests/Run-Tests.ps1
