name: דיווח על תקלה
description: דווחו על התנהגות שניתן לשחזר
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        תודה על הדיווח. אין לפרסם כאן סודות או חולשות אבטחה.
        לדיווח אבטחה השתמשו ב-SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: תיאור התקלה
      description: מה קרה ומה ציפית שיקרה?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: שלבי שחזור
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: אזור
      options:
        - Telegram bot
        - Mini App
        - Supabase / database
        - Deployment / setup
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: גרסה או commit
  - type: textarea
    id: logs
    attributes:
      label: לוגים רלוונטיים
      description: הסירו tokens, מזהים ונתונים אישיים.
      render: shell
