project_id = "tachles"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false

# Telegram delivers updates without a Supabase JWT; the function verifies the
# Telegram secret-token header instead, so JWT verification is disabled here.
[functions.telegram-webhook]
verify_jwt = false

# Invoked by pg_cron via pg_net; authenticated with the x-dispatch-secret header.
[functions.dispatch-reminders]
verify_jwt = false

[functions.sync-calendars]
verify_jwt = false

[functions.agent-tick]
verify_jwt = false

[functions.snapshot-daily]
verify_jwt = false

# Google calls this endpoint directly. It validates OAuth state instead of
# accepting a Supabase JWT.
[functions.oauth-callback]
verify_jwt = false

# The Mini App authenticates each request with signed Telegram initData.
[functions.api]
verify_jwt = false

# The standalone PWA authenticates with a Supabase access token. JWT
# verification stays in the function so it can resolve the full auth user and
# map it to the channel-independent Tachles profile.
[functions.api-web]
verify_jwt = false
